<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <title>Health Analysis Data</title>
    <link rel="stylesheet" href="./health_analysis.css">    
    </head>
    <body>
        <nav><h1>Health Analysis Census</h1>
        <ul>            
            <li><a href="./index.html" id="home">Home </li>
            <li><a href="./health_contact.html" id="contact">Contact Us </li>
            <li><input type="text" id="conditionInput" placeholder="Enter a health condition"></li>
            <li><button id="btnSearch">Search</li>
            </ul>
        </nav>
        <div class="container">
        <div class="analysisForm">
            <h1>Health Data Analysis</h1>
            <div>
            <label>Gender</label>
            <label for="male">Male</label>
            <input type="radio" name="gender" id="male" value="male">
            <label for="female">Female</label>
            <input type="radio" name="gender" id="female" value="female">
            </div>
            <div>
            <label>Age</label>
            <input type="number" id="age">
            </div>
            <div>
            <label for="condition">Condition</label>
            <select id="condition">
            <option value="">Select condition</option>                    
            <option value="Diabetes">Diabetes</option>                    
            <option value="Thyroid">Thyroid</option>                    
            <option value="High Blood Preasure">HIgh Blood Pressure</option>
            </select>
        </div>
        <button id="addPatient">Add Patient</button>
        <h2>Analysis Report</h2>
        <div id="report"></h2>
        </div>
        <div class="searchCondition">
            <div id="result"></div>
        </div>
    </div>
    <script src="./health_analysis.js"></script>
</body>
</html>
